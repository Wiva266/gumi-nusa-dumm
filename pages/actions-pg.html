<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- / Title / -->
    <title>Mari Berpartisipasi | Gumi Nusa - Hadir Untuk Menjaga Bumi Nusantara</title>
    <!-- / Stylesheet Links / -->
    <link rel="stylesheet" href="/styles/style-actions-pg.css">
    <link rel="shortcut icon" href="/images/imgs-icon/original-logo-gumi-nusa.png" type="image/x-icon">
    <!-- / Library Links / -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css"></head>
<body>
    <!-- --- ===== Poltek Indramayu ===== --- -->
    <!-- Team  : Stibal Dev Singaraja         -->
    <!-- School: SMK TI Bali Global Singaraja -->
    <!-- --- ===== --- ======== --- ===== --- -->

    <!-- = Glow Dot Background = -->
    <div class="glow-dot-bg"></div>

    <!-- === Main === -->
    <main>
        <a data-aos="fade-right" data-aos-duration="1000" href="/index.html" class="back-btn"><i class="ri-arrow-left-s-line"></i> Beranda</a>

        <div class="actions-container">
            <div class="title-part">
                <img src="/images/imgs-icon/original-logo-gumi-nusa.png" alt="Logo Gumi Nusa">
                <h1 data-aos="fade-up" data-aos-duration="1000">Jadilah Bagian Dari Perubahan!</h1>
                <p data-aos="fade-up" data-aos-duration="1000">Pilih kontribusi yang bisa kamu lakukan!</p>
            </div>

            <div data-aos="fade-up" data-aos-duration="1500" class="content-part">
                <a target="_blank" href="https://pmi.or.id/donation/monetary/donate-now" class="card">
                    <i class="ri-arrow-right-up-line"></i>
                    <i class="fa-solid fa-hand-holding-heart"></i>
                    <h2>Jadi Donatur</h2>
                    <p>Berikan dukunganmu untuk menjaga bumi.</p>
                </a>
                <a target="_blank" href="https://www.pmi.or.id/volunteer" class="card">
                    <i class="ri-arrow-right-up-line"></i>
                    <i class="fa-solid fa-hand-back-fist"></i>
                    <h2>Jadi Relawan</h2>
                    <p>Ambil bagian langsung dalam aksi lingkungan.</p>
                </a>
            </div>
        </div>
    </main>

    <!-- / Script / -->
    <!-- Library -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <!-- Pure -->
    <script src="/scripts/ai-script/bg-glow-dot.js"></script>
