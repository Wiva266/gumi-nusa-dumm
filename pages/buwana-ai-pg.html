<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- / Title / -->
    <title>Tanya Buwana | Gumi Nusa - Hadir Untuk Menjaga Bumi Nusantara</title>
    <!-- / Stylesheet Links / -->
    <link rel="stylesheet" href="styles/style-ai-pg.css">
    <link rel="shortcut icon" href="images/imgs-icon/original-logo-gumi-nusa.png" type="image/x-icon">
    <!-- / Library Links / -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css"></head>
<body>
    <!-- --- ===== Poltek Indramayu ===== --- -->
    <!-- Team  : Stibal Dev Singaraja         -->
    <!-- School: SMK TI Bali Global Singaraja -->
    <!-- --- ===== --- ======== --- ===== --- -->

    <!-- = Glow Dot Background = -->
    <div class="glow-dot-bg"></div>

    <!-- === Main === -->
    <main>
        <div class="max-box">
            <a data-aos="fade-right" data-aos-duration="1000" href="index.html" class="back-btn"><i class="ri-arrow-left-s-line"></i> Beranda</a>

            <!-- = CONTAINER = -->
            <div class="container">
                <!-- Welcome -->
                <div id="welcome" class="welcome">
                    <img src="images/imgs-icon/original-logo-gumi-nusa.png" alt="Logo Buwana">
                    <h1 data-aos="fade-up" data-aos-duration="1500">Selamat datang, Aku Buwana!</h1>
                    <p data-aos="fade-up" data-aos-duration="1500">Punya pertanyaan tentang lingkungan? Tanya <span>Buwana A.I</span> dan temukan jawabannya!</p>

                    <div data-aos="fade-up" data-aos-duration="2000" class="suggestions">
                        <div>
                            <small><i class="fa-solid fa-question"></i></small>
                            <div onclick="useSuggestion(this)">Apa penyebab utama banjir di Indonesia?</div>
                        </div>
                        <div>
                            <small><i class="fa-solid fa-question"></i></small>
                            <div onclick="useSuggestion(this)">Bagaimana cara mengurangi emisi karbon?</div>
                        </div>
                        <div>
                            <small><i class="fa-solid fa-question"></i></small>
                            <div onclick="useSuggestion(this)">Apa dampak sampah plastik bagi laut?</div>
                        </div>
                    </div>
                </div>

                <!-- Chat -->
                <div id="chat-box"></div>

                <!-- Input, Button -->
                <div class="input-area">
                    <section>
                        <input id="user-input" type="text" placeholder="Tanya sesuatu...">
                        <button onclick="handleSend()"><i class="ri-send-ins-fill"></i></button>
                    </section>
                    <button id="mic-btn"><i class="ri-mic-2-ai-fill"></i></button>
                </div>
            </div>

            <!-- = VOICE POPUP = -->
            <div id="voice-popup">
                <div class="voice-box">
                    <img src="images/imgs-icon/original-logo-gumi-nusa.png" alt="Logo Buwana">
                    <h2>Buwana AI <span>Sedang mendengarkan</span></h2>
                    <p id="voice-text">. . .</p>
                    <button id="cancel-voice">Batalkan</button>
                </div>
            </div>

        </div>
        <!--  -->
    </main>

    <!-- / Script / -->
    <!-- Library -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <!-- Pure -->
    <script src="scripts/ai-script/bg-glow-dot.js"></script>
    <script src="scripts/ai-script/ai-script.js"></script>

    <script>
        AOS.init();
    </script>
</body>
</html>
